<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-image: url("https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExYjl2NHJtMGNlNmR2eTh2bjNucTMwdHIwZTFvazgxcGljeHE2ZmZycCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/JqmupuTVZYaQX5s094/giphy.gif");
      background-repeat: repeat;
    }

    .card {
      border: none;
      border-radius: 15px;
    }

    .btn-primary {
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 360px;">
      <h3 class="text-center mb-3">Registrarse</h3>

      <form>
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre</label>
          <input type="text" class="form-control" id="nombre" placeholder="Ingrese su nombre">
        </div>

        <div class="mb-3">
          <label for="apellido" class="form-label">Apellido</label>
          <input type="text" class="form-control" id="apellido" placeholder="Ingrese su apellido">
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="Ingrese su email">
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña">
        </div>

        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
          <input type="password" class="form-control" id="confirmPassword" placeholder="Repita su contraseña">
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-2">Crear cuenta</button>

        <div class="text-center">
          <small>¿Ya tenés cuenta? <a href="login.html">Ingresar</a></small>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
