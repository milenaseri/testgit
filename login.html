<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-image: url("https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExYjl2NHJtMGNlNmR2eTh2bjNucTMwdHIwZTFvazgxcGljeHE2ZmZycCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/JqmupuTVZYaQX5s094/giphy.gif");
      background-repeat: repeat;
    }
  </style>
</head>

<body>

  <div class="container d-flex justify-content-center align-items-center vh-100">
    
    <div class="card p-4" style="width: 300px;">
      
      <h3 class="text-center mb-3">Login</h3>

      <form>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" placeholder="Ingrese su email">
        </div>

        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" placeholder="Ingrese su contraseña">
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Ingresar
        </button>

      </form>

    </div>

  </div>

</body>
</html>
